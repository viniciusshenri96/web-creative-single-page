<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/favicon-32x32.png"
    />
    <link rel="stylesheet" href="assets/css/style.css" />

    <title>Frontend Mentor | Creative single page site</title>
  </head>
  <body>
    <header class="header container">
      <img src="assets/images/desktop/logo.svg" alt="logo creative" />
      <div class="nav__bg">
        <nav class="nav">
          <ul class="nav__list">
            <li class="nav__item">About</li>
            <li class="nav__item">Service</li>
            <li class="nav__item">Projects</li>
          </ul>
          <a href="/" class="btn btn__header">Schedule a call</a>
        </nav>
      </div>
    </header>

    <section class="hero container">
      <div class="hero__content">
        <h1 class="hero__title font-h1">Branding & website design agency</h1>
        <p class="hero__text font-body">
          We specialize in visual storytelling by creating cohesive brand and
          website design solutions for small businesses, giving lasting
          impressions to audiences in a digital world.
        </p>
        <a href="/" class="btn__hero">Learn More</a>
      </div>
      <img
        class="hero__img"
        src="assets/images/desktop/image-hero.jpg"
        alt=""
      />
    </section>
  </body>
</html>
